<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Menu | Zulbery's Kitchen</title>

    <link rel="stylesheet" href="menu.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- ==========================
         NAVBAR
    =========================== -->
   <header class="menu-navbar">

    <a href="index.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="logo">

        <img src="logo.png" alt="Logo">

        <h2>Our Menu</h2>

    </div>

    <a href="cart.html" class="cart-link">

    <i class="fa-solid fa-cart-shopping"></i>

    <span id="cartBadge">0</span>

</a>


</header>

    <!-- ==========================
         SEARCH BAR
    =========================== -->

    <section class="menu-top">

        <div class="menu-intro">
            <span class="intro-label">Signature Selection</span>
            <h3>Curated favorites and premium comfort food, designed to feel elevated.</h3>
        </div>

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="search"
                placeholder="Search your favorite food...">

        </div>

    </section>

    <!-- ==========================
         CATEGORY FILTER
    =========================== -->

    <section class="category-filter">

        <button class="active">
            <i class="fa-solid fa-utensils"></i>
            All
        </button>

        <button>
            <i class="fa-solid fa-burger"></i>
            Burgers
        </button>

        <button>
            <i class="fa-solid fa-pizza-slice"></i>
            Pizza
        </button>

        <button>
            <i class="fa-solid fa-drumstick-bite"></i>
            Broast
        </button>

        <button>
            <i class="fa-solid fa-bowl-food"></i>
            Fries
        </button>

        <button>
            <i class="fa-solid fa-glass-water"></i>
            Drinks
        </button>

    </section>

    <!-- ==========================
         PRODUCTS
    =========================== -->

    <section class="products">

    </section>

    <script src="menu.js"></script>

</body>

</html>
